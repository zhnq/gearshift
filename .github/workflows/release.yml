name: Release

# 推送形如 v0.2.0 的 tag 即自动构建并发布 Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 也可在 Actions 页面手动触发（仅构建，不发布）

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test (Core)
        run: dotnet test tests/GearShift.Core.Tests/GearShift.Core.Tests.csproj -c Release

      - name: Resolve version
        id: ver
        run: |
          $tag = "${{ github.ref_name }}"
          $v = if ($tag -match '^v') { $tag.TrimStart('v') } else { '0.0.0-dev' }
          "version=$v"                        | Out-File $env:GITHUB_OUTPUT -Append
          "asset=GearShift-$v-win-x64"        | Out-File $env:GITHUB_OUTPUT -Append

      - name: Publish (framework-dependent, x64)
        run: >
          dotnet publish src/GearShift.App/GearShift.App.csproj
          -c Release -r win-x64 -p:Platform=x64
          --self-contained false -p:WindowsAppSDKSelfContained=false
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      - name: Detect signing configuration
        id: signing
        env:
          SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
        run: |
          $enabled = -not [string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE)
          "enabled=$($enabled.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Sign binaries (optional)
        if: steps.signing.outputs.enabled == 'true'
        env:
          SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'gearshift-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE))
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object FullName -Match '\\x64\\signtool\.exe$' |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signTool) { throw 'signtool.exe not found on runner' }
          Get-ChildItem publish -File | Where-Object {
            $_.Name -eq 'GearShift.exe' -or $_.Name -eq 'GearShift.dll' -or $_.Name -eq 'GearShift.Core.dll'
          } | ForEach-Object {
            & $signTool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:SIGNING_PASSWORD $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "Signing failed: $($_.Name)" }
            & $signTool verify /pa $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "Signature verification failed: $($_.Name)" }
          }
          Remove-Item -LiteralPath $pfx -Force

      - name: Zip
        run: Compress-Archive -Path publish/* -DestinationPath "${{ steps.ver.outputs.asset }}.zip" -Force

      - name: Write checksum
        run: |
          $file = "${{ steps.ver.outputs.asset }}.zip"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $file" | Set-Content SHA256SUMS.txt -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.ver.outputs.asset }}
          path: |
            ${{ steps.ver.outputs.asset }}.zip
            SHA256SUMS.txt

      # 仅当由 tag 触发时才创建 Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "${{ steps.ver.outputs.asset }}.zip"
          "SHA256SUMS.txt"
          --title "GearShift ${{ github.ref_name }}"
          --generate-notes
